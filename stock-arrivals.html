<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incoming Stock - Noriks Analytics</title>
    <link rel="stylesheet" href="/dashboard/styles.css?v=20260224bc">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .form-card {
            background: var(--card-bg);
            border-radius: var(--card-radius);
            box-shadow: var(--card-shadow);
            padding: 24px;
            margin-bottom: 24px;
        }
        .form-card h3 {
            margin-bottom: 20px;
            font-size: 16px;
            color: var(--text-primary);
            font-weight: 600;
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
        }
        .form-group input, .form-group select {
            background: var(--content-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 14px;
            border-radius: 6px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }
        .btn {
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background: #2563eb;
        }
        .btn-danger {
            background: var(--danger);
            color: white;
            padding: 6px 12px;
            font-size: 12px;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .btn-success {
            background: var(--success);
            color: white;
            padding: 6px 12px;
            font-size: 12px;
        }
        
        .table-card {
            background: var(--card-bg);
            border-radius: var(--card-radius);
            box-shadow: var(--card-shadow);
            padding: 24px;
            overflow-x: auto;
        }
        .table-card h3 {
            margin-bottom: 16px;
            font-size: 16px;
            color: var(--text-primary);
            font-weight: 600;
        }
        .arrivals-table {
            width: 100%;
            border-collapse: collapse;
        }
        .arrivals-table th, .arrivals-table td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        .arrivals-table th {
            background: var(--content-bg);
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
        }
        .arrivals-table tr:hover {
            background: #f9fafb;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-pending { background: var(--warning-soft); color: var(--warning); }
        .status-arriving { background: rgba(59, 130, 246, 0.15); color: var(--primary); }
        .status-arrived { background: var(--success-soft); color: var(--success); }
        
        .type-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .type-T-Shirt { background: rgba(59, 130, 246, 0.15); color: var(--primary); }
        .type-Boxers { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
        .type-Socks { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
        
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .summary-card {
            background: var(--card-bg);
            border-radius: var(--card-radius);
            box-shadow: var(--card-shadow);
            padding: 20px;
            text-align: center;
        }
        .summary-card h4 {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
        }
        .summary-card .value {
            font-size: 1.75rem;
            font-weight: 700;
        }
        .summary-card .subtext {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }
        
        .actions-cell {
            display: flex;
            gap: 8px;
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
        
        <!-- Sidebar -->
        <aside class="sidebar"></aside>
        
        <!-- Main Content -->
        <main class="main">
            <header class="topbar">
                <div class="topbar-left">
                    <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
                    <h1 class="page-title">🚚 Incoming Stock</h1>
                </div>
                <div class="topbar-right">
                    <div class="status-badge">
                        <span class="status-dot"></span>
                        <span>Live</span>
                    </div>
                </div>
            </header>
            
            <div class="content">
                <!-- Summary Cards -->
                <div class="summary-cards">
                    <div class="summary-card">
                        <h4>📦 Pending Arrivals</h4>
                        <div class="value" id="pendingCount" style="color: var(--warning);">0</div>
                        <div class="subtext">shipments</div>
                    </div>
                    <div class="summary-card">
                        <h4>🔢 Total Incoming QTY</h4>
                        <div class="value" id="totalQty" style="color: var(--primary);">0</div>
                        <div class="subtext">pieces</div>
                    </div>
                    <div class="summary-card">
                        <h4>📅 Next Arrival</h4>
                        <div class="value" id="nextArrival" style="color: var(--success); font-size: 1.25rem;">-</div>
                        <div class="subtext" id="nextArrivalDays"></div>
                    </div>
                </div>
                
                <!-- Add New Arrival Form -->
                <div class="form-card">
                    <h3>➕ Add Incoming Stock</h3>
                    <form id="arrivalForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Product Type</label>
                                <select id="productType" required>
                                    <option value="">Select type...</option>
                                    <option value="T-Shirt">👕 T-Shirt</option>
                                    <option value="Boxers">🩲 Boxers</option>
                                    <option value="Socks">🧦 Socks</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Color</label>
                                <select id="productColor" required>
                                    <option value="">Select color...</option>
                                    <option value="Black">Black</option>
                                    <option value="White">White</option>
                                    <option value="Grey">Grey</option>
                                    <option value="Navy">Navy</option>
                                    <option value="Mixed">Mixed</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Size</label>
                                <select id="productSize" required>
                                    <option value="">Select size...</option>
                                    <option value="XS">XS</option>
                                    <option value="S">S</option>
                                    <option value="M">M</option>
                                    <option value="L">L</option>
                                    <option value="XL">XL</option>
                                    <option value="2XL">2XL</option>
                                    <option value="3XL">3XL</option>
                                    <option value="4XL">4XL</option>
                                    <option value="ALL">ALL (mixed)</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Quantity (QTY)</label>
                                <input type="number" id="quantity" min="1" placeholder="e.g. 500" required>
                            </div>
                            <div class="form-group">
                                <label>Arrival Date</label>
                                <input type="date" id="arrivalDate" required>
                            </div>
                            <div class="form-group">
                                <label>Notes (optional)</label>
                                <input type="text" id="notes" placeholder="e.g. Supplier name, order #">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">➕ Add Arrival</button>
                    </form>
                </div>
                
                <!-- Arrivals Table -->
                <div class="table-card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                        <h3 style="margin: 0;">📋 Pending Arrivals</h3>
                        <div id="bulkActions" style="display: none; gap: 8px;">
                            <span id="selectedCount" style="color: var(--text-muted); margin-right: 8px;">0 selected</span>
                            <button class="btn btn-success" onclick="bulkAddToStock()">📦 V zalogo</button>
                            <button class="btn btn-danger" onclick="bulkDelete()">🗑 Briši</button>
                        </div>
                    </div>
                    <table class="arrivals-table">
                        <thead>
                            <tr>
                                <th style="width: 40px;"><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)"></th>
                                <th>Product</th>
                                <th>Type</th>
                                <th>Color</th>
                                <th>Size</th>
                                <th>QTY</th>
                                <th>Arrival Date</th>
                                <th>Status</th>
                                <th>Notes</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="arrivalsBody">
                        </tbody>
                    </table>
                    <div class="empty-state" id="emptyState">
                        <div class="icon">📦</div>
                        <p>No incoming stock scheduled</p>
                        <p>Add your first arrival above!</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('open');
            document.querySelector('.sidebar-overlay').classList.toggle('active');
        }
        function toggleCollapse() {
            const sidebar = document.querySelector('.sidebar');
            const btn = document.querySelector('.collapse-btn');
            sidebar.classList.toggle('collapsed');
            const isCollapsed = sidebar.classList.contains('collapsed');
            btn.querySelector('.collapse-text').textContent = isCollapsed ? 'Show' : 'Hide Menu';
            btn.querySelector('.collapse-icon').textContent = isCollapsed ? '▶' : '◀';
            localStorage.setItem('sidebarCollapsed', isCollapsed);
        }
        // Load saved collapse state
        if (localStorage.getItem('sidebarCollapsed') === 'true') {
            document.querySelector('.sidebar').classList.add('collapsed');
            const collapseText = document.querySelector('.collapse-text');
            const collapseIcon = document.querySelector('.collapse-icon');
            if (collapseText) collapseText.textContent = 'Show';
            if (collapseIcon) collapseIcon.textContent = '▶';
        }
        function logout() {
            window.location.href = '/dashboard/';
        }
        
        let arrivals = [];
        
        async function loadArrivals() {
            try {
                const response = await fetch('/dashboard/stock-arrivals.json?t=' + Date.now());
                const data = await response.json();
                arrivals = data.arrivals || [];
                renderArrivals();
                updateSummary();
            } catch (err) {
                console.error('Failed to load arrivals:', err);
                arrivals = [];
                renderArrivals();
            }
        }
        
        async function saveArrivals() {
            try {
                await fetch('/dashboard/api/stock-arrivals', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ arrivals, lastUpdated: new Date().toISOString() })
                });
            } catch (err) {
                console.error('Failed to save:', err);
                alert('Failed to save. Please try again.');
            }
        }
        
        function getStatus(arrivalDate) {
            if (!arrivalDate) return { text: 'Pending', class: 'status-pending', days: null };
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const arrival = new Date(arrivalDate);
            arrival.setHours(0, 0, 0, 0);
            
            const diffDays = Math.ceil((arrival - today) / (1000 * 60 * 60 * 24));
            
            if (diffDays < 0) return { text: 'Overdue', class: 'status-pending', days: diffDays };
            if (diffDays === 0) return { text: 'Today!', class: 'status-arriving', days: 0 };
            if (diffDays <= 3) return { text: `In ${diffDays}d`, class: 'status-arriving', days: diffDays };
            return { text: `In ${diffDays}d`, class: 'status-pending', days: diffDays };
        }
        
        function renderArrivals() {
            const tbody = document.getElementById('arrivalsBody');
            const emptyState = document.getElementById('emptyState');
            
            // Filter out arrived items, sort by date
            const pending = arrivals
                .filter(a => !a.arrived)
                .sort((a, b) => {
                    const dateA = a.arrivalDate || a.addedDate || '9999-12-31';
                    const dateB = b.arrivalDate || b.addedDate || '9999-12-31';
                    return new Date(dateA) - new Date(dateB);
                });
            
            if (pending.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            
            tbody.innerHTML = pending.map((item, index) => {
                const dateStr = item.arrivalDate || item.addedDate;
                const status = getStatus(dateStr);
                const sku = `${item.type}-${item.color}-${item.size}`;
                const originalIndex = arrivals.indexOf(item);
                const dateDisplay = dateStr ? new Date(dateStr).toLocaleDateString('sl-SI') : '-';
                
                return `
                    <tr>
                        <td><input type="checkbox" class="row-checkbox" data-index="${originalIndex}" onchange="updateBulkActions()"></td>
                        <td><strong>${sku}</strong></td>
                        <td><span class="type-badge type-${item.type.replace(/\s/g, '-')}">${item.type}</span></td>
                        <td>${item.color}</td>
                        <td style="font-weight: 600; font-family: monospace;">${item.size}</td>
                        <td style="font-weight: 700; color: var(--primary);">${item.qty.toLocaleString()}</td>
                        <td>${dateDisplay}</td>
                        <td><span class="status-badge ${status.class}">${status.text}</span></td>
                        <td>
                            <div style="display: flex; gap: 4px; align-items: center;">
                                <input type="text" id="notes-${originalIndex}" class="notes-input" value="${item.notes || ''}" placeholder="opombe..." style="background: var(--content-bg); border: 1px solid var(--border-color); padding: 4px 8px; width: 100px; font-size: 12px; color: var(--text-primary); border-radius: 4px;">
                                <button onclick="saveNote(${originalIndex}, document.getElementById('notes-${originalIndex}').value)" style="padding: 4px 8px; font-size: 11px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer;">💾</button>
                            </div>
                        </td>
                        <td>
                            <div style="display: flex; gap: 8px; white-space: nowrap;">
                                <button class="btn btn-success" onclick="addToStock(${originalIndex})" title="Dodaj v zalogo">📦 V zalogo</button>
                                <button class="btn btn-danger" onclick="deleteArrival(${originalIndex})">🗑</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }
        
        function updateSummary() {
            const pending = arrivals.filter(a => !a.arrived);
            const totalQty = pending.reduce((sum, a) => sum + a.qty, 0);
            
            document.getElementById('pendingCount').textContent = pending.length;
            document.getElementById('totalQty').textContent = totalQty.toLocaleString();
            
            // Find next arrival - use arrivalDate or addedDate
            const withDates = pending
                .map(a => ({ ...a, dateStr: a.arrivalDate || a.addedDate }))
                .filter(a => a.dateStr)
                .sort((a, b) => new Date(a.dateStr) - new Date(b.dateStr));
            
            if (withDates.length > 0) {
                const next = withDates[0];
                document.getElementById('nextArrival').textContent = new Date(next.dateStr).toLocaleDateString('sl-SI');
                const status = getStatus(next.dateStr);
                document.getElementById('nextArrivalDays').textContent = 
                    status.days === null ? 'pending' :
                    status.days === 0 ? 'Today!' : 
                    status.days < 0 ? `${Math.abs(status.days)} days overdue` : `in ${status.days} days`;
            } else {
                document.getElementById('nextArrival').textContent = '-';
                document.getElementById('nextArrivalDays').textContent = '';
            }
        }
        
        async function addToStock(index) {
            const item = arrivals[index];
            if (!item) return;
            
            const sku = `${item.type.toUpperCase().replace('T-SHIRT', 'TSHIRT')}-${item.color.toUpperCase()}-${item.size.toUpperCase()}`;
            
            if (confirm(`Dodaj ${item.qty}x ${item.type} ${item.color} ${item.size} v zalogo?`)) {
                try {
                    // First get current stock for this SKU
                    const invRes = await fetch('/dashboard/api/inventory');
                    const invData = await invRes.json();
                    const invItem = invData.inventory?.find(i => i.sku === sku);
                    
                    if (!invItem) {
                        alert('SKU ni najden v inventarju: ' + sku);
                        return;
                    }
                    
                    const newStock = invItem.stock + item.qty;
                    
                    // Update inventory
                    const res = await fetch('/dashboard/api/inventory/update', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ sku, stock: newStock })
                    });
                    const data = await res.json();
                    
                    if (data.ok) {
                        // Mark as arrived
                        arrivals[index].arrived = true;
                        arrivals[index].arrivedAt = new Date().toISOString();
                        await saveArrivals();
                        renderArrivals();
                        updateSummary();
                        alert(`✅ Dodano! ${sku}: ${invItem.stock} → ${newStock}`);
                    } else {
                        alert('Napaka: ' + (data.error || 'Unknown'));
                    }
                } catch (e) {
                    alert('Napaka: ' + e.message);
                }
            }
        }
        
        async function deleteArrival(index) {
            if (confirm('Izbriši ta vnos?')) {
                arrivals.splice(index, 1);
                await saveArrivals();
                renderArrivals();
                updateSummary();
            }
        }
        
        async function saveNote(index, value) {
            if (arrivals[index]) {
                arrivals[index].notes = value;
                await saveArrivals();
                // Brief visual feedback
                const input = document.getElementById('notes-' + index);
                if (input) {
                    input.style.borderColor = 'var(--success)';
                    setTimeout(() => input.style.borderColor = 'var(--border-color)', 1000);
                }
            }
        }
        
        function toggleSelectAll(checkbox) {
            const checkboxes = document.querySelectorAll('.row-checkbox');
            checkboxes.forEach(cb => cb.checked = checkbox.checked);
            updateBulkActions();
        }
        
        function updateBulkActions() {
            const checkboxes = document.querySelectorAll('.row-checkbox:checked');
            const bulkActions = document.getElementById('bulkActions');
            const selectedCount = document.getElementById('selectedCount');
            
            if (checkboxes.length > 0) {
                bulkActions.style.display = 'flex';
                selectedCount.textContent = `${checkboxes.length} izbrano`;
            } else {
                bulkActions.style.display = 'none';
            }
            
            // Update select all checkbox state
            const allCheckboxes = document.querySelectorAll('.row-checkbox');
            const selectAll = document.getElementById('selectAll');
            if (allCheckboxes.length > 0 && checkboxes.length === allCheckboxes.length) {
                selectAll.checked = true;
                selectAll.indeterminate = false;
            } else if (checkboxes.length > 0) {
                selectAll.checked = false;
                selectAll.indeterminate = true;
            } else {
                selectAll.checked = false;
                selectAll.indeterminate = false;
            }
        }
        
        function getSelectedIndices() {
            const checkboxes = document.querySelectorAll('.row-checkbox:checked');
            return Array.from(checkboxes).map(cb => parseInt(cb.dataset.index));
        }
        
        async function bulkAddToStock() {
            const indices = getSelectedIndices();
            if (indices.length === 0) return;
            
            const items = indices.map(i => arrivals[i]).filter(Boolean);
            const totalQty = items.reduce((sum, item) => sum + item.qty, 0);
            
            if (!confirm(`Dodaj ${items.length} vnosov (${totalQty.toLocaleString()} kosov) v zalogo?`)) return;
            
            let success = 0;
            let errors = [];
            
            for (const index of indices) {
                const item = arrivals[index];
                if (!item) continue;
                
                const sku = `${item.type.toUpperCase().replace('T-SHIRT', 'TSHIRT')}-${item.color.toUpperCase()}-${item.size.toUpperCase()}`;
                
                try {
                    const invRes = await fetch('/dashboard/api/inventory');
                    const invData = await invRes.json();
                    const invItem = invData.inventory?.find(i => i.sku === sku);
                    
                    if (!invItem) {
                        errors.push(`${sku}: SKU ni najden`);
                        continue;
                    }
                    
                    const newStock = invItem.stock + item.qty;
                    
                    const res = await fetch('/dashboard/api/inventory/update', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ sku, stock: newStock })
                    });
                    const data = await res.json();
                    
                    if (data.ok) {
                        arrivals[index].arrived = true;
                        arrivals[index].arrivedAt = new Date().toISOString();
                        success++;
                    } else {
                        errors.push(`${sku}: ${data.error || 'Unknown error'}`);
                    }
                } catch (e) {
                    errors.push(`${sku}: ${e.message}`);
                }
            }
            
            await saveArrivals();
            renderArrivals();
            updateSummary();
            
            if (errors.length > 0) {
                alert(`✅ ${success} dodano, ❌ ${errors.length} napak:\n${errors.join('\n')}`);
            } else {
                alert(`✅ Vseh ${success} vnosov dodano v zalogo!`);
            }
        }
        
        async function bulkDelete() {
            const indices = getSelectedIndices();
            if (indices.length === 0) return;
            
            if (!confirm(`Izbriši ${indices.length} vnosov?`)) return;
            
            // Delete in reverse order to maintain correct indices
            indices.sort((a, b) => b - a);
            for (const index of indices) {
                arrivals.splice(index, 1);
            }
            
            await saveArrivals();
            renderArrivals();
            updateSummary();
            
            alert(`✅ Izbrisano ${indices.length} vnosov`);
        }
        
        // Form submission
        document.getElementById('arrivalForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newArrival = {
                id: Date.now(),
                type: document.getElementById('productType').value,
                color: document.getElementById('productColor').value,
                size: document.getElementById('productSize').value,
                qty: parseInt(document.getElementById('quantity').value),
                arrivalDate: document.getElementById('arrivalDate').value,
                notes: document.getElementById('notes').value,
                createdAt: new Date().toISOString(),
                arrived: false
            };
            
            arrivals.push(newArrival);
            await saveArrivals();
            renderArrivals();
            updateSummary();
            
            // Reset form
            e.target.reset();
            
            // Set default date to tomorrow
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            document.getElementById('arrivalDate').value = tomorrow.toISOString().split('T')[0];
        });
        
        // Set default date
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('arrivalDate').value = tomorrow.toISOString().split('T')[0];
        
        loadArrivals();
    </script>
