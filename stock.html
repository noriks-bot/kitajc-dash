<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock — Noriks Kitajc</title>
    <link rel="stylesheet" href="/dashboard/styles.css?v=20260224be">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .stock-wrap {
            padding: 24px;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            padding: 24px;
            margin-bottom: 24px;
        }
        .card-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #1a202c;
        }
        .add-form {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-group label {
            font-size: 11px;
            font-weight: 600;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            color: #1a202c;
            outline: none;
        }
        .form-group input:focus { border-color: #1A3A2A; }
        .inp-name { width: 200px; }
        .inp-price { width: 110px; }
        .inp-qty { width: 80px; }
        .btn-add {
            padding: 9px 20px;
            background: #1A3A2A;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            height: 38px;
        }
        .btn-add:hover { background: #2D5A3A; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            font-family: inherit;
        }
        th {
            text-align: left;
            padding: 9px 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #718096;
            border-bottom: 2px solid #e2e8f0;
        }
        td {
            padding: 11px 12px;
            border-bottom: 1px solid #f0f4f8;
            color: #1a202c;
            vertical-align: middle;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f7fafc; }
        .qty-cell { display: flex; align-items: center; gap: 8px; }
        .qty-btn {
            width: 26px; height: 26px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            background: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            color: #1A3A2A;
            display: flex; align-items: center; justify-content: center;
            padding: 0; line-height: 1;
        }
        .qty-btn:hover { background: #f0fdf4; }
        .qty-val { min-width: 30px; text-align: center; font-weight: 600; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-ok  { background: #dcfce7; color: #166534; }
        .badge-low { background: #fef9c3; color: #854d0e; }
        .badge-zero{ background: #fee2e2; color: #dc2626; }
        .btn-del {
            background: #fee2e2; color: #dc2626;
            border: none; border-radius: 6px;
            padding: 5px 11px; font-size: 12px;
            cursor: pointer; font-weight: 600;
        }
        .btn-del:hover { background: #fecaca; }
        .editable-price {
            cursor: pointer;
            border-bottom: 1px dashed #a0aec0;
            display: inline-block;
        }
        .editable-price:hover { border-bottom-color: #1A3A2A; color: #1A3A2A; }
        .price-input {
            width: 80px; padding: 3px 6px;
            border: 1px solid #1A3A2A; border-radius: 5px;
            font-size: 14px; font-family: inherit;
        }
        .empty { text-align: center; padding: 36px; color: #a0aec0; font-size: 14px; }
        .tfoot-row td {
            font-weight: 700;
            border-top: 2px solid #e2e8f0;
            background: #f7fafc;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <aside class="sidebar"></aside>

    <main class="main">
        <header class="topbar">
            <div class="topbar-left">
                <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
                <h1 class="page-title">Stock</h1>
            </div>
            <div class="topbar-right">
                <span id="username-display" style="font-size:13px;color:#718096;"></span>
                <button onclick="doLogout()" style="margin-left:12px;padding:6px 14px;border:1px solid #e2e8f0;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;">Odjava</button>
            </div>
        </header>

        <div class="content">
            <div class="stock-wrap">

                <!-- Add form -->
                <div class="card">
                    <div class="card-title">Dodaj izdelek</div>
                    <div class="add-form">
                        <div class="form-group">
                            <label>Ime izdelka</label>
                            <input class="inp-name" id="inp-name" type="text" placeholder="npr. Kitajc Pro XL">
                        </div>
                        <div class="form-group">
                            <label>Nabavna cena (€)</label>
                            <input class="inp-price" id="inp-price" type="number" placeholder="0.00" step="0.01" min="0">
                        </div>
                        <div class="form-group">
                            <label>Količina</label>
                            <input class="inp-qty" id="inp-qty" type="number" placeholder="0" min="0">
                        </div>
                        <button class="btn-add" onclick="addProduct()">+ Dodaj</button>
                    </div>
                </div>

                <!-- Table -->
                <div class="card">
                    <div class="card-title">Zaloga</div>
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Ime izdelka</th>
                                <th>Nabavna cena</th>
                                <th>Količina</th>
                                <th>Prodaje</th>
                                <th>Status</th>
                                <th>Vrednost zalog</th>
                            </tr>
                        </thead>
                        <tbody id="stock-tbody"></tbody>
                        <tfoot id="stock-tfoot"></tfoot>
                    </table>
                </div>

            </div>
        </div>
    </main>
</div>

<script src="/dashboard/sidebar.js"></script>
<script>renderSidebar("stock");</script>
<script>
const STOCK_KEY = 'kitajc_stock_v1';

function loadStock() {
    try { return JSON.parse(localStorage.getItem(STOCK_KEY)) || []; } catch(e) { return []; }
}
function saveStock(d) { localStorage.setItem(STOCK_KEY, JSON.stringify(d)); }

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function badge(qty) {
    if (qty <= 0) return '<span class="badge badge-zero">Izčrpano</span>';
    if (qty <= 5) return '<span class="badge badge-low">Malo</span>';
    return '<span class="badge badge-ok">OK</span>';
}

function render() {
    const items = loadStock();
    const tbody = document.getElementById('stock-tbody');
    const tfoot = document.getElementById('stock-tfoot');
    if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty">Ni še nobenih izdelkov. Dodaj prvega zgoraj.</td></tr>';
        tfoot.innerHTML = '';
        return;
    }
    let total = 0;
    tbody.innerHTML = items.map((item, i) => {
        const qty = item.quantity || 0;
        const sold = item.sold || 0;
        const val = (item.purchase_price || 0) * qty;
        total += val;
        return `<tr>
            <td>${i+1}</td>
            <td>${esc(item.name)}</td>
            <td><span class="editable-price" onclick="editPrice(${i})" title="Klikni za urejanje">€ ${Number(item.purchase_price||0).toFixed(2)}</span></td>
            <td><div class="qty-cell">
                <button class="qty-btn" onclick="chQty(${i},-1)">−</button>
                <span class="qty-val">${qty}</span>
                <button class="qty-btn" onclick="chQty(${i},+1)">+</button>
            </div></td>
            <td><div class="qty-cell">
                <button class="qty-btn" onclick="chSold(${i},-1)">−</button>
                <span class="qty-val">${sold}</span>
                <button class="qty-btn" onclick="chSold(${i},+1)">+</button>
            </div></td>
            <td>${badge(qty)}</td>
            <td>€ ${val.toFixed(2)}</td>
        </tr>`;
    }).join('');
    tfoot.innerHTML = `<tr class="tfoot-row">
        <td colspan="5" style="text-align:right;padding-right:12px;">Skupna vrednost zalog:</td>
        <td colspan="2">€ ${total.toFixed(2)}</td>
    </tr>`;
}

function chSold(i, d) {
    const items = loadStock();
    const prev = items[i].sold || 0;
    const newSold = Math.max(0, prev + d);
    const delta = newSold - prev; // how much sold changed
    items[i].sold = newSold;
    // subtract from quantity when adding sales
    items[i].quantity = Math.max(0, (items[i].quantity || 0) - delta);
    saveStock(items); render();
}

function editPrice(i) {
    const items = loadStock();
    const cells = document.querySelectorAll('#stock-tbody tr');
    const cell = cells[i].querySelectorAll('td')[2];
    const cur = items[i].purchase_price || 0;
    cell.innerHTML = `<input class="price-input" id="price-inp-${i}" type="number" value="${cur}" step="0.01" min="0">`;
    const inp = document.getElementById(`price-inp-${i}`);
    inp.focus(); inp.select();
    function save() {
        items[i].purchase_price = parseFloat(inp.value) || 0;
        saveStock(items); render();
    }
    inp.addEventListener('blur', save);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') save(); if (e.key === 'Escape') render(); });
}

function addProduct() {
    const name = document.getElementById('inp-name').value.trim();
    const price = parseFloat(document.getElementById('inp-price').value) || 0;
    const qty   = parseInt(document.getElementById('inp-qty').value)   || 0;
    if (!name) { alert('Vnesi ime izdelka'); return; }
    const items = loadStock();
    items.push({ name, purchase_price: price, quantity: qty });
    saveStock(items);
    document.getElementById('inp-name').value = '';
    document.getElementById('inp-price').value = '';
    document.getElementById('inp-qty').value = '';
    render();
}

function chQty(i, d) {
    const items = loadStock();
    items[i].quantity = Math.max(0, (items[i].quantity||0) + d);
    saveStock(items); render();
}

function del(i) {
    if (!confirm('Odstrani ta izdelek?')) return;
    const items = loadStock();
    items.splice(i, 1);
    saveStock(items); render();
}

function doLogout() {
    fetch('/dashboard/api/logout', { method: 'POST' }).then(() => location.href = '/dashboard/login');
}

// Show username from sidebar auth
fetch('/dashboard/api/me').then(r => r.json()).then(d => {
    if (d.username) document.getElementById('username-display').textContent = d.username;
}).catch(() => {});

// Pre-populate with initial data if stock is empty
(function() {
    const existing = loadStock();
    if (existing.length === 0) {
        const initial = [
            { name: 'nekitig',  purchase_price: 4.69, quantity: 3912, sold: 0 },
            { name: 'elemas',   purchase_price: 6.85, quantity: 1008, sold: 0 },
            { name: 'secug',    purchase_price: 3.36, quantity: 828,  sold: 0 },
            { name: 'felifun',  purchase_price: 4.00, quantity: 600,  sold: 0 },
            { name: 'frypan',   purchase_price: 2.73, quantity: 2016, sold: 0 },
            { name: 'prskalica',purchase_price: 3.02, quantity: 2040, sold: 0 },
            { name: 'defrost',  purchase_price: 3.00, quantity: 1000, sold: 0 },
        ];
        saveStock(initial);
    }
})();

['inp-name','inp-price','inp-qty'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => { if (e.key==='Enter') addProduct(); })
);

render();
</script>
</body>
</html>
