<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock — Noriks Kitajc</title>
    <link rel="stylesheet" href="/dashboard/styles.css?v=20260224be">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .stock-wrap { padding: 24px; }

        /* Add form card */
        .add-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
            padding: 20px 24px;
            margin-bottom: 20px;
            border: 1px solid #e8f0e8;
        }
        .add-card-title {
            font-size: 12px;
            font-weight: 700;
            color: #1A3A2A;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 14px;
        }
        .add-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .field label {
            font-size: 10px;
            font-weight: 700;
            color: #8a9ab0;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }
        .field input {
            height: 36px;
            padding: 0 11px;
            border: 1px solid #dde3ea;
            border-radius: 7px;
            font-size: 13px;
            font-family: inherit;
            color: #1a202c;
            background: #fafbfc;
            outline: none;
            transition: border-color 0.15s, background 0.15s;
        }
        .field input:focus { border-color: #1A3A2A; background: #fff; }
        .field-name input { width: 190px; }
        .field-sku input { width: 95px; text-transform: uppercase; }
        .field-price input { width: 100px; }
        .field-qty input { width: 85px; }
        .btn-add {
            height: 36px;
            padding: 0 18px;
            background: #1A3A2A;
            color: #fff;
            border: none;
            border-radius: 7px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 0.2px;
        }
        .btn-add:hover { background: #2D5A3A; }

        /* Table card */
        .table-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
            border: 1px solid #e8f0e8;
            overflow: hidden;
        }
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px 14px;
            border-bottom: 1px solid #f0f4f0;
        }
        .table-title {
            font-size: 14px;
            font-weight: 700;
            color: #1a202c;
        }
        .table-meta {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .updated-at {
            font-size: 11px;
            color: #b0bec5;
        }
        .btn-refresh {
            height: 30px;
            padding: 0 12px;
            background: #f0fdf4;
            color: #1A3A2A;
            border: 1px solid #bbf7d0;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-refresh:hover { background: #dcfce7; }
        .btn-refresh.loading { opacity: 0.6; pointer-events: none; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead th {
            padding: 9px 14px;
            text-align: left;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #8a9ab0;
            background: #fafbfc;
            border-bottom: 1px solid #edf0f2;
            white-space: nowrap;
        }
        td {
            padding: 11px 14px;
            border-bottom: 1px solid #f5f7f5;
            color: #1a202c;
            vertical-align: middle;
        }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: #f9fdf9; }

        .sku-tag {
            font-size: 11px;
            font-weight: 600;
            color: #1A3A2A;
            background: #f0fdf4;
            padding: 2px 7px;
            border-radius: 4px;
            border: 1px solid #bbf7d0;
            font-family: monospace;
            letter-spacing: 0.3px;
        }
        .editable {
            cursor: pointer;
            border-bottom: 1px dashed #c0ccd8;
            display: inline-block;
            transition: color 0.1s;
        }
        .editable:hover { color: #1A3A2A; border-bottom-color: #1A3A2A; }
        .inline-input {
            width: 80px; padding: 3px 7px;
            border: 1px solid #1A3A2A; border-radius: 5px;
            font-size: 13px; font-family: inherit;
        }
        .num { font-variant-numeric: tabular-nums; }
        .sold-today { font-weight: 700; color: #1A3A2A; }
        .stock-remain { font-weight: 700; }

        .badge {
            display: inline-block; padding: 2px 8px;
            border-radius: 20px; font-size: 10px; font-weight: 700; letter-spacing: 0.3px;
        }
        .badge-ok   { background: #dcfce7; color: #166534; }
        .badge-low  { background: #fef9c3; color: #92400e; }
        .badge-zero { background: #fee2e2; color: #dc2626; }

        tfoot td {
            padding: 10px 14px;
            font-weight: 700;
            font-size: 13px;
            background: #f9fdf9;
            border-top: 2px solid #e8f0e8;
            color: #1a202c;
        }
        .empty { text-align: center; padding: 40px; color: #b0bec5; font-size: 13px; }
        .loading-row { text-align: center; padding: 32px; color: #b0bec5; font-size: 13px; font-style: italic; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <aside class="sidebar"></aside>

    <main class="main">
        <header class="topbar">
            <div class="topbar-left">
                <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
                <h1 class="page-title">Stock</h1>
            </div>
            <div class="topbar-right">
                <span id="username-display" style="font-size:13px;color:#718096;"></span>
                <button onclick="doLogout()" style="margin-left:12px;padding:5px 13px;border:1px solid #e2e8f0;border-radius:7px;background:#fff;cursor:pointer;font-size:12px;font-family:inherit;">Odjava</button>
            </div>
        </header>

        <div class="content">
            <div class="stock-wrap">

                <!-- Add form -->
                <div class="add-card">
                    <div class="add-card-title">+ Dodaj izdelek</div>
                    <div class="add-row">
                        <div class="field field-name">
                            <label>Ime izdelka</label>
                            <input id="inp-name" type="text" placeholder="npr. Wok Tava 8v1">
                        </div>
                        <div class="field field-sku">
                            <label>SKU</label>
                            <input id="inp-sku" type="text" placeholder="NEKITIG">
                        </div>
                        <div class="field field-price">
                            <label>Nabavna cena (€)</label>
                            <input id="inp-price" type="number" placeholder="0.00" step="0.01" min="0">
                        </div>
                        <div class="field field-qty">
                            <label>Začetna zaloga</label>
                            <input id="inp-qty" type="number" placeholder="0" min="0">
                        </div>
                        <button class="btn-add" onclick="addProduct()">+ Dodaj</button>
                    </div>
                </div>

                <!-- Table -->
                <div class="table-card">
                    <div class="table-header">
                        <div class="table-title">Zaloga izdelkov</div>
                        <div class="table-meta">
                            <span class="updated-at" id="updated-at"></span>
                            <button class="btn-refresh" id="btn-refresh" onclick="loadData()">🔄 Osveži</button>
                        </div>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Ime izdelka</th>
                                <th>SKU</th>
                                <th>Nabavna cena</th>
                                <th>Zač. zaloga</th>
                                <th>Prodaje danes</th>
                                <th>Prodaje skupaj</th>
                                <th>Zaloga ostalo</th>
                                <th>Status</th>
                                <th>Vrednost zalog</th>
                            </tr>
                        </thead>
                        <tbody id="tbody">
                            <tr><td colspan="10" class="loading-row">Nalagam...</td></tr>
                        </tbody>
                        <tfoot id="tfoot"></tfoot>
                    </table>
                </div>

            </div>
        </div>
    </main>
</div>

<script src="/dashboard/sidebar.js"></script>
<script>renderSidebar('stock');</script>
<script>
let _items = [];

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function badge(q) {
    if (q <= 0) return '<span class="badge badge-zero">Izčrpano</span>';
    if (q <= 10) return '<span class="badge badge-low">Malo</span>';
    return '<span class="badge badge-ok">OK</span>';
}
function fmt(n) { return Number(n||0).toFixed(2); }

function render(items) {
    const tbody = document.getElementById('tbody');
    const tfoot = document.getElementById('tfoot');
    if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="10" class="empty">Ni še nobenih izdelkov.</td></tr>';
        tfoot.innerHTML = ''; return;
    }
    let totalVal = 0;
    tbody.innerHTML = items.map((item, i) => {
        const qty = item.quantity || 0;
        const val = (item.purchase_price || 0) * qty;
        totalVal += val;
        return `<tr>
            <td style="color:#b0bec5;font-size:12px;">${i+1}</td>
            <td style="font-weight:500;">${esc(item.name)}</td>
            <td><span class="sku-tag">${esc(item.sku||'—')}</span></td>
            <td><span class="editable num" onclick="editField(${i},'purchase_price')" title="Klikni za urejanje">€ ${fmt(item.purchase_price)}</span></td>
            <td class="num">${item.initial_quantity||0}</td>
            <td class="num sold-today">${item.sold_today||0}</td>
            <td class="num">${item.sold_all||0}</td>
            <td class="num stock-remain">${qty}</td>
            <td>${badge(qty)}</td>
            <td class="num">€ ${fmt(val)}</td>
        </tr>`;
    }).join('');
    tfoot.innerHTML = `<tr>
        <td colspan="9" style="text-align:right;">Skupna vrednost zalog:</td>
        <td class="num">€ ${fmt(totalVal)}</td>
    </tr>`;
}

async function loadData() {
    const btn = document.getElementById('btn-refresh');
    btn.classList.add('loading');
    btn.textContent = '⏳ Nalagam...';
    try {
        const r = await fetch('/dashboard/api/kitajc-stock');
        _items = await r.json();
        // Sort by sold_all descending by default
        _items.sort((a, b) => (b.sold_all || 0) - (a.sold_all || 0));
        render(_items);
        document.getElementById('updated-at').textContent = 'Posodobljeno ' + new Date().toLocaleTimeString('sl-SI');
    } catch(e) {
        document.getElementById('tbody').innerHTML = '<tr><td colspan="10" class="empty">Napaka pri nalaganju.</td></tr>';
    }
    btn.classList.remove('loading');
    btn.textContent = '🔄 Osveži';
}

async function save(items) {
    const toSave = items.map(it => ({ name: it.name, sku: it.sku, purchase_price: it.purchase_price, initial_quantity: it.initial_quantity }));
    await fetch('/dashboard/api/kitajc-stock', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(toSave) });
}

function editField(i, field) {
    const colIndex = field === 'purchase_price' ? 3 : 4;
    const cell = document.querySelectorAll('#tbody tr')[i].querySelectorAll('td')[colIndex];
    const cur = _items[i][field] || 0;
    cell.innerHTML = `<input class="inline-input" id="ei-${i}" type="number" value="${cur}" step="${field==='purchase_price'?'0.01':'1'}" min="0">`;
    const inp = document.getElementById(`ei-${i}`);
    inp.focus(); inp.select();
    async function commit() {
        _items[i][field] = parseFloat(inp.value) || 0;
        await save(_items);
        await loadData();
    }
    inp.addEventListener('blur', commit);
    inp.addEventListener('keydown', e => { if (e.key==='Enter') commit(); if (e.key==='Escape') render(_items); });
}

async function addProduct() {
    const name  = document.getElementById('inp-name').value.trim();
    const sku   = document.getElementById('inp-sku').value.trim().toUpperCase();
    const price = parseFloat(document.getElementById('inp-price').value) || 0;
    const qty   = parseInt(document.getElementById('inp-qty').value) || 0;
    if (!name) { alert('Vnesi ime izdelka'); return; }
    if (!sku)  { alert('Vnesi SKU'); return; }
    const r = await fetch('/dashboard/api/kitajc-stock');
    const current = await r.json();
    const toSave = current.map(it => ({ name: it.name, sku: it.sku, purchase_price: it.purchase_price, initial_quantity: it.initial_quantity }));
    toSave.push({ name, sku, purchase_price: price, initial_quantity: qty });
    await fetch('/dashboard/api/kitajc-stock', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(toSave) });
    ['inp-name','inp-sku','inp-price','inp-qty'].forEach(id => document.getElementById(id).value = '');
    await loadData();
}

function doLogout() {
    fetch('/dashboard/api/logout', { method: 'POST' }).then(() => location.href = '/dashboard/login');
}

// SKU input force uppercase
document.getElementById('inp-sku').addEventListener('input', function() { this.value = this.value.toUpperCase(); });

fetch('/dashboard/api/me').then(r=>r.json()).then(d => {
    if (d.username) document.getElementById('username-display').textContent = d.username;
}).catch(()=>{});

['inp-name','inp-sku','inp-price','inp-qty'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if (e.key==='Enter') addProduct(); });
});

loadData();
</script>
</body>
</html>
